filter {
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"] #convert to kibana main time field stamp 
      target => "@timestamp"
    }
  }

  if [honeypot] == "cowrie" {
    mutate { add_tag => ["cowrie"] }
  }

  if [honeypot] == "dionaea" {
    mutate { add_tag => ["dionaea"] }
  }
}

filter {
  if [src_ip] {
    geoip {
      source => "src_ip"
      target => "geoip"
    }
  } else if [remote_host] {
    geoip {
      source => "remote_host"
      target => "geoip"
    }
  }
  # Logstash 9.x wraps output in geoip.geo — flatten it up to geoip level
  if [geoip][geo] {
    mutate {
      copy => {
        "[geoip][geo][location]"        => "[geoip][location]"
        "[geoip][geo][country_name]"    => "[geoip][country_name]"
        "[geoip][geo][city_name]"       => "[geoip][city_name]"
        "[geoip][geo][country_iso_code]"=> "[geoip][country_code2]"
      }
      remove_field => ["[geoip][geo]"]
    }
  }
}


filter {
  if [eventid] in ["cowrie.session.connect", "cowrie.client.version", "cowrie.client.kex", "cowrie.telnet.option", "cowrie.client.fingerprint", "cowrie.session.params"] {
    mutate { 
      add_field => { 
        "kill_chain_stage" => "Reconnaissance" 
        # "mitre_tactic" => "Credential Access"
        # "mitre_technique" => "Brute Force"
        # "mitre_technique_id" => "T1110"
      } 
    }
  }
  else if [eventid] in ["cowrie.login.success", "cowrie.login.failed"] {
    mutate { 
      add_field => { 
        "kill_chain_stage" => "Exploitation" 
        # "mitre_tactic" => "Initial Access"
        # "mitre_technique" => "Valid Accounts"
        # "mitre_technique_id" => "T1078"
      } 
    }
  }
  else if [eventid] in ["cowrie.session.file_download"] {
    mutate { 
      add_field => { 
        "kill_chain_stage" => "Delivery and Installation" 
        # "mitre_tactic" => "Execution"
        # "mitre_technique" => "Command and Scripting Interpreter"
        # "mitre_technique_id" => "T1059"
      } 
    }
  }
  else if [eventid] in ["cowrie.command.input", "cowrie.command.failed"] {
    mutate { 
      add_field => { 
        "kill_chain_stage" => "Command and Control (C2)" 
        # "mitre_tactic" => "Execution"
        # "mitre_technique" => "Command and Scripting Interpreter"
        # "mitre_technique_id" => "T1059"
      } 
    }
  }
  else if [eventid] in ["cowrie.direct-tcpip.request", "cowrie.session.file_upload"] {
    mutate { 
      add_field => { 
        "kill_chain_stage" => "Actions on Objective" 
        # "mitre_tactic" => "Execution"
        # "mitre_technique" => "Command and Scripting Interpreter"
        # "mitre_technique_id" => "T1059"
      } 
    }
  }
  else if [eventid] in "cowrie.session.closed" {
    mutate { 
      add_field => { 
        "kill_chain_stage" => "Metadata/ Cleanup" 
        # "mitre_tactic" => "Execution"
        # "mitre_technique" => "Command and Scripting Interpreter"
        # "mitre_technique_id" => "T1059"
      } 
    }
  }
}

filter {
  if [honeypot] == "dionaea" {
    if [connection][protocol] in ["httpd", "https"] {
      mutate { add_field => { "kill_chain_stage" => "Reconnaissance" } }
      mutate { add_field => { "attack_classification" => "Low" } }
      mutate { add_field => { "recommended_action" => "Monitor HTTP probes for vulnerability scanning patterns." } }
    }
    else if [connection][protocol] in ["smbd", "eternalblue"] {
      mutate { add_field => { "kill_chain_stage" => "Exploitation" } }
      mutate { add_field => { "attack_classification" => "High" } }
      mutate { add_field => { "recommended_action" => "SMB exploitation attempt detected. Ensure all systems are patched against EternalBlue and similar vulnerabilities." } }
    }
    else if [connection][protocol] in ["mysqld"] {
      mutate { add_field => { "kill_chain_stage" => "Exploitation" } }
      mutate { add_field => { "attack_classification" => "High" } }
      mutate { add_field => { "recommended_action" => "MySQL probe detected. Ensure database ports are not exposed publicly in production." } }
    }
    else if [connection][protocol] in ["ftpd"] {
      mutate { add_field => { "kill_chain_stage" => "Delivery and Installation" } }
      mutate { add_field => { "attack_classification" => "Medium" } }
      mutate { add_field => { "recommended_action" => "FTP probe detected. Consider disabling FTP in favor of SFTP." } }
    }
    else if [connection][protocol] in ["sip"] {
      mutate { add_field => { "kill_chain_stage" => "Reconnaissance" } }
      mutate { add_field => { "attack_classification" => "Low" } }
      mutate { add_field => { "recommended_action" => "SIP probe detected. Monitor for VoIP abuse." } }
    }
  }
}

filter {
  ruby {
    code => '
      ip = event.get("src_ip")
      if ip
        parts = ip.split(".")
        event.set("src_subnet", parts[0..2].join(".") + ".0/24")
      end
    '
  }
}

filter {
  if [eventid] in ["cowrie.session.connect","cowrie.session.closed","cowrie.client.version", "cowrie.client.kex", "cowrie.telnet.option", "cowrie.session.params"] {
    mutate { add_field => { "attack_classification" => "Low" } }
    mutate { add_field => { "recommended_action" => "If certain versions or protocols are frequently seen, use this data to confirm decommissions of production systems." } }
  }
  else if [eventid] in ["cowrie.client.fingerprint"] {
    mutate { add_field => { "attack_classification" => "Medium" } }
    mutate { add_field => { "recommended_action" => "Use the SSH client fingerprint to track persistent attackers who may change their IP address but continue using the same toolkit." } }
  }
  else if [eventid] in ["cowrie.login.failed", "cowrie.command.failed"] {
    mutate { add_field => { "attack_classification" => "Medium" } }
    mutate { add_field => { "recommended_action" => "If logins use usernames or patterns common to the industry, contact security team to run targeted phishing on the specific credentials." } }
  }
  else if [eventid] in ["cowrie.direct-tcpip.request"] {
    mutate { add_field => { "attack_classification" => "High" } }
    mutate { add_field => { "recommended_action" => "Verify internal network is securely segmented, ensure that the intruder cannot use one compromised system to reach more confidential areas of operation." } }
  }
  else if [eventid] in ["cowrie.command.input", "cowrie.session.file_download", "cowrie.session.file_upload", "cowrie.login.success"] {
    mutate { add_field => { "attack_classification" => "High" } }
    mutate { add_field => { "recommended_action" => "Analyze command inputs and uploaded/downloaded files to see what attackers do after they get in. Use this intelligence to invest in specific internal controls." } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "honeypot-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug } #prints to console for debuging can get rid of later 
}